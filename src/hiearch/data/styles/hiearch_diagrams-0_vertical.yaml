# Diagrams package style for hiearch
# This style provides node definitions that use icons from the diagrams package
# https://github.com/mingrammer/diagrams

# Base style node with common attributes for all diagrams icons
# Provider-specific nodes inherit from this using 'style' (to inherit tags)
# User nodes inherit from provider nodes using 'style_notag' (to NOT inherit tags)
nodes:
    - id: ["", hh_diagrams_base]
      tags: ["hh_diagrams_style"]
      graphviz:
          shape: "box"
          fontname: "Sans-Serif"
          fontsize: "24"

    - id: ["", hh_diagrams_node]
      style: hh_diagrams_base
      graphviz:
          style: "rounded,dashed"
          fontcolor: "#2D3436"
          penwidth: "0.5"
          margin: "0"
          width: 3.2
          height: 4
          color: black
          # HTML table label format: top row = icon, bottom row = label
          node_label_format: '<<table fixedsize="true" width="200" border="0" cellborder="0" cellspacing="0" cellpadding="0"><tr><td><img src="{resource_image}"/></td></tr><tr><td>{label}</td></tr></table>>'
          scope_label_format: '<<table fixedsize="true" width="200" border="0" cellborder="0" cellspacing="0" cellpadding="0"><tr><td><img src="{resource_image}"/></td></tr><tr><td>{label}</td></tr></table>>'

    # Scope/Cluster node for grouping elements (like diagrams.Cluster)
    # Use this as a parent node to group related elements visually
    - id: ["", hh_diagrams_scope]
      style: hh_diagrams_base
      graphviz:
          style: "rounded,filled"
          fillcolor: "#E5F5FD"
          penwidth: "2"
          color: "#CCCCCC"
          margin: "25"

edges:
    - link: [hh_diagrams_node, hh_diagrams_node, hh_diagrams_link]
      graphviz:
          color: "#7B8894"
          fontname: "Sans-Serif"
          fontsize: "20"
          fontcolor: "#2D3436"
          arrowsize: "1.5"
          penwidth: "3"

# View style for diagrams-based visualizations
views:
    - id: hh_diagrams_view
      nodes: []
      graphviz:
          graph:
              pad: "0"
              splines: "ortho"
              nodesep: "0.5"
              ranksep: "2.0"
