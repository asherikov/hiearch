# UML State Machine Diagram Styles for hiearch

nodes:
    - id: ["", hh_state_machine_node]
      tags: ["hh_state_machine"]
      graphviz:
        fontsize: "12"
        fontname: "Helvetica"
        margin: "0.1"
    - id: ["", hh_state_machine_initial]
      tags: ["hh_state_machine"]
      style: hh_state_machine_node
      graphviz:
        shape: circle
        style: filled
        fillcolor: black
        width: "0.3"
        height: "0.3"
        fixedsize: "true"
        label: ""
    - id: ["", hh_state_machine_final]
      tags: ["hh_state_machine"]
      style: hh_state_machine_node
      graphviz:
        shape: doublecircle
        style: filled
        fillcolor: black
        color: black
        fontcolor: black
        width: "0.2"
        height: "0.2"
        fixedsize: "true"
        label: ""
    - id: ["", hh_state_machine_junction]
      tags: ["hh_state_machine"]
      style: hh_state_machine_node
      graphviz:
        shape: rectangle
        style: filled
        fillcolor: black
        width: "1.0"
        height: "0.05"
        fixedsize: "true"
        label: ""
    - id: ["", hh_state_machine_regular]
      tags: ["hh_state_machine"]
      style: hh_state_machine_node
      graphviz:
        shape: rectangle
        style: "rounded,filled"
        fillcolor: "#f0f8ff"
        peripheries: "1"
    - id: ["", hh_state_machine_choice]
      tags: ["hh_state_machine"]
      style: hh_state_machine_node
      graphviz:
        shape: diamond
        style: filled
        fillcolor: black
        width: "0.3"
        height: "0.3"

edges:
    - link: [hh_state_machine_node, hh_state_machine_node, hh_state_machine_edge]
      tags: ["hh_state_machine"]
      graphviz:
        fontsize: "10"
        fontname: "Helvetica"
        arrowsize: "0.8"

views:
    - id: hh_state_machine_view
      nodes: []
      graphviz:
        graph:
            rankdir: TB
            style: "rounded, filled"
            fillcolor: "#fafafa"