# UML Use Case Diagram Styles for hiearch

nodes:
    - id: ["", hh_use_case_node]
      tags: ["hh_use_case"]
      graphviz:
        fontsize: "12"
        fontname: "Helvetica"
        margin: "0.1"
    - id: ["", hh_use_case_actor]
      tags: ["hh_use_case"]
      style: hh_use_case_node
      graphviz:
        shape: star
        style: "filled"
        fillcolor: "#e6f3ff"
        peripheries: "0"
        width: "0.8"
        height: "0.8"
        fixedsize: "true"
    - id: ["", hh_use_case_case]
      tags: ["hh_use_case"]
      style: hh_use_case_node
      graphviz:
        shape: ellipse
        style: "filled,rounded"
        fillcolor: "#f0f8ff"
        peripheries: "1"
        width: "1.8"
        height: "0.9"
        fixedsize: "false"
    - id: ["", hh_use_case_system_boundary]
      tags: ["hh_use_case"]
      style: hh_use_case_node
      scope: []
      graphviz:
        shape: rectangle
        style: "rounded,filled"
        fillcolor: "#fafafa"
        peripheries: "1"
        width: "3.0"
        height: "2.0"
    - id: ["", hh_use_case_relationship_helper]
      tags: ["hh_use_case"]
      style: hh_use_case_node
      graphviz:
        shape: plaintext
        label: ""
        style: invis

edges:
    - link: [hh_use_case_relationship_helper, hh_use_case_relationship_helper, hh_use_case_edge]
      tags: ["hh_use_case"]
      graphviz:
        fontsize: "10"
        fontname: "Helvetica"
        arrowsize: "0.8"
        labelfontsize: "9"
        labelfontname: "Helvetica"
    - link: [hh_use_case_relationship_helper, hh_use_case_relationship_helper, hh_use_case_association]
      tags: ["hh_use_case"]
      style: hh_use_case_edge
      graphviz:
        style: solid
        color: black
        dir: none
    - link: [hh_use_case_relationship_helper, hh_use_case_relationship_helper, hh_use_case_include]
      tags: ["hh_use_case"]
      style: hh_use_case_edge
      graphviz:
        style: dashed
        color: black
        dir: forward
        arrowhead: open
        label: "\u00abinclude\u00bb"
    - link: [hh_use_case_relationship_helper, hh_use_case_relationship_helper, hh_use_case_extend]
      tags: ["hh_use_case"]
      style: hh_use_case_edge
      graphviz:
        style: dashed
        color: black
        dir: forward
        arrowhead: open
        label: "\u00abextend\u00bb"
    - link: [hh_use_case_relationship_helper, hh_use_case_relationship_helper, hh_use_case_generalization]
      tags: ["hh_use_case"]
      style: hh_use_case_edge
      graphviz:
        style: solid
        color: black
        dir: forward
        arrowhead: empty

views:
    - id: hh_use_case_view
      nodes: []
      graphviz:
        graph:
            rankdir: TB
            style: "rounded, filled"
            fillcolor: "#fafafa"